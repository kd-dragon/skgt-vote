# skgt.fun 최종 Nginx 설정 (Certbot SSL 적용 완료 상태 기준)
# → /etc/nginx/sites-available/skgt-vote 로 복사하여 사용.
# 목적: https://skgt.fun 요청을 내부 앱(127.0.0.1:3000)으로 프록시 → 사용자는 포트 입력 불필요.

# WebSocket 업그레이드용 map (http 컨텍스트)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP(80) → HTTPS(443) 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name skgt.fun;
    return 301 https://$host$request_uri;
}

# HTTPS(443)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name skgt.fun;

    # Certbot 이 발급한 인증서 경로 (skgt.fun 기준)
    ssl_certificate     /etc/letsencrypt/live/skgt.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skgt.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    # 모든 요청(페이지 + /api/socket 웹소켓)을 앱으로 프록시
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket 업그레이드 (Socket.io 실시간)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 원본 정보 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 실시간 연결 장시간 유지
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# 주의:
# - ssl_dhparam 파일이 없다는 nginx -t 오류가 나면 해당 줄을 삭제하면 됨.
# - skgt.fun 서버 블록이 default 등 다른 파일에도 있으면 충돌하므로, skgt.fun 은 이 파일에서만 정의할 것.
