# Nginx 리버스 프록시 설정 — /etc/nginx/sites-available/skgt-vote 로 복사
# Socket.io(WebSocket) 업그레이드 헤더 처리를 포함한다.
# your-domain.com 을 실제 도메인으로 교체할 것.

# WebSocket 업그레이드용 map (http 컨텍스트에 포함됨)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # 업로드/요청 본문 여유 (채팅/투표엔 작지만 안전값)
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket 업그레이드
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 원본 정보 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 실시간 연결이 오래 유지되므로 타임아웃 확대
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ※ HTTPS(443) 서버 블록과 80→443 리다이렉트는 Certbot(certbot --nginx)이
#    이 파일을 자동으로 수정하며 추가한다. 수동으로 작성할 필요 없음.
